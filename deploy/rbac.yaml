# Read-only access for the in-cluster deployment. The UI never mutates anything,
# so the ClusterRole is restricted to get/list/watch on Gateway API objects plus
# the core resources needed to resolve backends and show namespaces.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gateway-api-ui
  namespace: gateway-api-ui
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gateway-api-ui-readonly
rules:
  # For WRITE_ENABLED=true, add "create","update","patch","delete" to the verbs of
  # the Gateway API + policy rules below (leave core/discovery read-only).
  - apiGroups: ["gateway.networking.k8s.io"]
    resources:
      - gatewayclasses
      - gateways
      - httproutes
      - grpcroutes
      - tlsroutes
      - tcproutes
      - udproutes
      - referencegrants
    verbs: ["get", "list", "watch"]
  # Optional Envoy Gateway policy CRDs — harmless if the group is absent.
  - apiGroups: ["gateway.envoyproxy.io"]
    resources: ["securitypolicies", "clienttrafficpolicies", "backendtrafficpolicies"]
    verbs: ["get", "list", "watch"]
  # Optional Envoy AI Gateway CRDs — harmless if the group is absent.
  - apiGroups: ["aigateway.envoyproxy.io"]
    resources: ["aigatewayroutes", "aiservicebackends", "backendsecuritypolicies"]
    verbs: ["get", "list", "watch"]
  # Core lookups for backend resolution / namespace selector.
  - apiGroups: [""]
    resources: ["namespaces", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gateway-api-ui-readonly
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: gateway-api-ui-readonly
subjects:
  - kind: ServiceAccount
    name: gateway-api-ui
    namespace: gateway-api-ui
