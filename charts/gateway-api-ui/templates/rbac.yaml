{{- if .Values.rbac.create -}}
{{- $verbs := list "get" "list" "watch" -}}
{{- if .Values.write.enabled -}}{{- $verbs = list "get" "list" "watch" "create" "update" "patch" "delete" -}}{{- end -}}
# Gateway API objects get {{ if .Values.write.enabled }}read-write{{ else }}read-only{{ end }} verbs;
# core/discovery lookups stay read-only. Write verbs are added only when write.enabled.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "gateway-api-ui.fullname" . }}
  labels:
    {{- include "gateway-api-ui.labels" . | nindent 4 }}
rules:
  - apiGroups: ["gateway.networking.k8s.io"]
    resources:
      - gatewayclasses
      - gateways
      - httproutes
      - grpcroutes
      - tlsroutes
      - tcproutes
      - udproutes
      - referencegrants
    verbs: {{ $verbs | toJson }}
  # Optional Envoy Gateway policy CRDs — harmless if the group is absent.
  - apiGroups: ["gateway.envoyproxy.io"]
    resources: ["securitypolicies", "clienttrafficpolicies", "backendtrafficpolicies"]
    verbs: {{ $verbs | toJson }}
  # Optional Envoy AI Gateway CRDs — harmless if the group is absent.
  - apiGroups: ["aigateway.envoyproxy.io"]
    resources: ["aigatewayroutes", "aiservicebackends", "backendsecuritypolicies"]
    verbs: {{ $verbs | toJson }}
  # Core lookups for backend resolution / namespace selector.
  - apiGroups: [""]
    resources: ["namespaces", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
  {{- with .Values.rbac.extraRules }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "gateway-api-ui.fullname" . }}
  labels:
    {{- include "gateway-api-ui.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "gateway-api-ui.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "gateway-api-ui.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
