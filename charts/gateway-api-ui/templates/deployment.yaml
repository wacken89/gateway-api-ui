apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gateway-api-ui.fullname" . }}
  labels:
    {{- include "gateway-api-ui.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "gateway-api-ui.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "gateway-api-ui.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "gateway-api-ui.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: CACHE_TTL_SECONDS
              value: {{ .Values.config.cacheTtlSeconds | quote }}
            - name: CLUSTER_NAME
              value: {{ .Values.config.clusterName | default .Release.Name | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
            - name: WRITE_ENABLED
              value: {{ .Values.write.enabled | quote }}
            {{- with .Values.prometheus.url }}
            - name: PROMETHEUS_URL
              value: {{ . | quote }}
            {{- end }}
            {{- range $k, $v := .Values.prometheus.queries }}
            {{- if $v }}
            - name: PROMETHEUS_QUERY_{{ $k | upper }}
              value: {{ $v | quote }}
            {{- end }}
            {{- end }}
            {{- with .Values.prometheus.clusterRegex }}
            - name: PROMETHEUS_CLUSTER_REGEX
              value: {{ . | quote }}
            {{- end }}
            - name: AUTH_ENABLED
              value: {{ .Values.auth.enabled | quote }}
            {{- if .Values.auth.enabled }}
            - name: AUTH_ALLOWED_GROUPS
              value: {{ join "," .Values.auth.allowedGroups | quote }}
            - name: AUTH_LOGOUT_PATH
              value: {{ .Values.auth.logoutPath | quote }}
            - name: AUTH_NAME_HEADER
              value: {{ .Values.auth.headers.name | quote }}
            - name: AUTH_USERNAME_HEADER
              value: {{ .Values.auth.headers.username | quote }}
            - name: AUTH_EMAIL_HEADER
              value: {{ .Values.auth.headers.email | quote }}
            - name: AUTH_GROUPS_HEADER
              value: {{ .Values.auth.headers.groups | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
